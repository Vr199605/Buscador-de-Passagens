function genFlights(origin,dest){
  const base=400+Math.floor(Math.random()*1800);
  return Array.from({length:6+Math.floor(Math.random()*4)},(_,i)=>{
    const al=AIRLINES[Math.floor(Math.random()*AIRLINES.length)];
    const dH=6+Math.floor(Math.random()*14),dM=[0,15,30,45][Math.floor(Math.random()*4)];
    const durH=1+Math.floor(Math.random()*11),durM=[0,15,30,45][Math.floor(Math.random()*4)];
    const stops=Math.random()>.55?0:Math.random()>.5?1:2;
    const price=Math.round(base*(0.7+Math.random()*.8)+stops*100*(Math.random()-.5));
    return {id:`F${i}${Date.now()}`,airline:al,
      dep:{time:`${String(dH).padStart(2,"0")}:${String(dM).padStart(2,"0")}`,code:origin.code},
      arr:{time:`${String((dH+durH)%24).padStart(2,"0")}:${String((dM+durM)%60).padStart(2,"0")}`,code:dest.code},
      duration:`${durH}h${durM>0?" "+durM+"m":""}`,durMins:durH*60+durM,
      stops,baggage:Math.random()>.4?"1 bagagem":"Só bagagem de mão",
      price,seats:Math.floor(Math.random()*8)+1};
  }).sort((a,b)=>a.price-b.price);
}

// ── Sparkline ──────────────────────────────────────────────────────────────
function Sparkline({data,color="#22d3ee",height=40}){
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1;
  const w=120,pts=data.map((v,i)=>`${(i/(data.length-1))*w},${height-((v-min)/range)*(height-4)-2}`).join(" ");
  return h('svg',{width:w,height,style:{opacity:.8}},h('polyline',{points:pts,fill:"none",stroke:color,strokeWidth:"2",strokeLinecap:"round",strokeLinejoin:"round"}));
}

// ── Airport Autocomplete ───────────────────────────────────────────────────
function AirportInput({value,onChange,placeholder,dark}){
  const [q,setQ]=useState(value?`${value.city} (${value.code})`:"");
  const [open,setOpen]=useState(false);
  const filtered=q.length>1?AIRPORTS.filter(a=>
    a.city.toLowerCase().includes(q.toLowerCase())||
    a.code.toLowerCase().includes(q.toLowerCase())
  ).slice(0,5):[];
  return h('div',{style:{position:"relative"}},
    h('input',{
      value:q,
      onChange:e=>{setQ(e.target.value);setOpen(true);if(!e.target.value)onChange(null)},
      onFocus:()=>setOpen(true),
      onBlur:()=>setTimeout(()=>setOpen(false),150),
      placeholder,
      className:`w-full text-sm font-medium outline-none bg-transparent ${dark?"text-white placeholder-gray-500":"text-gray-900 placeholder-gray-400"}`
    }),
    open&&filtered.length>0&&h('div',{
      className:`absolute top-full left-0 mt-2 w-64 rounded-xl shadow-2xl border z-50 overflow-hidden ${dark?"bg-gray-900 border-gray-700":"bg-white border-gray-200"}`,
      style:{zIndex:9999}
    },filtered.map(a=>h('button',{
      key:a.code,
      onMouseDown:()=>{onChange(a);setQ(`${a.city} (${a.code})`);setOpen(false)},
      className:`w-full flex items-center gap-3 px-3 py-2 text-left transition-colors ${dark?"hover:bg-gray-800":"hover:bg-gray-50"}`
    },
      h('span',{className:`text-xs font-bold px-1.5 py-0.5 rounded ${dark?"bg-gray-700 text-cyan-400":"bg-gray-100 text-blue-600"}`},a.code),
      h('div',{},
        h('p',{className:`text-sm font-medium ${dark?"text-white":"text-gray-900"}`},a.city),
        h('p',{className:`text-xs ${dark?"text-gray-400":"text-gray-500"}`},`${a.name}, ${a.country}`)
      )
    )))
  );
}

// ── AI Assistant ───────────────────────────────────────────────────────────
function AIPanel({dark,onClose}){
  const [msgs,setMsgs]=useState([{role:"assistant",text:"Olá! Sou a Aria 🌟 Sua assistente de viagens com IA. Pergunte sobre preços, melhores épocas para viajar ou quando comprar passagens!"}]);
  const [inp,setInp]=useState("");
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),[msgs]);

  async function send(){
    if(!inp.trim()||loading)return;
    const txt=inp.trim();setInp("");
    setMsgs(m=>[...m,{role:"user",text:txt}]);
    setLoading(true);
    try{
      const history=msgs.filter((_,i)=>i>0).map(m=>({role:m.role,content:m.text}));
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-haiku-4-5-20251001",
          max_tokens:800,
          system:"Você é Aria, especialista em passagens aéreas do AirDeals. Responda em português brasileiro, de forma amigável e concisa. Dê dicas práticas sobre preços, melhores meses, destinos populares saindo do Brasil. Use emojis com moderação. Máximo 2 parágrafos.",
          messages:[...history,{role:"user",content:txt}]
        })
      });
      const data=await res.json();
      setMsgs(m=>[...m,{role:"assistant",text:data.content?.[0]?.text||"Não consegui processar. Tente novamente."}]);
    }catch(e){
      setMsgs(m=>[...m,{role:"assistant",text:"Erro de conexão. Tente novamente em instantes."}]);
    }
    setLoading(false);
  }

  return h('div',{
    className:`fixed bottom-4 right-4 z-50 w-80 rounded-2xl border flex flex-col overflow-hidden shadow-2xl anim-fade ${dark?"bg-gray-900 border-gray-700":"bg-white border-gray-200"}`,
    style:{height:380}
  },
    h('div',{className:`px-4 py-2.5 border-b flex items-center gap-2 ${dark?"border-gray-700":"border-gray-100"}`},
      h('div',{className:"w-7 h-7 rounded-full flex items-center justify-center",style:{background:"linear-gradient(135deg,#7c3aed,#06b6d4)"}},h(Bot,{size:14,className:"text-white"})),
      h('div',{},
        h('p',{className:`text-sm font-semibold ${dark?"text-white":"text-gray-900"}`},"Aria IA"),
        h('p',{className:"text-xs text-emerald-400"},"● Online")
      ),
      h('button',{onClick:onClose,className:`ml-auto text-xs px-2 py-1 rounded-lg ${dark?"text-gray-400 hover:text-white hover:bg-gray-800":"text-gray-400 hover:text-gray-700 hover:bg-gray-100"}`},"✕")
    ),
    h('div',{className:"flex-1 overflow-y-auto p-3 space-y-2"},
      msgs.map((m,i)=>h('div',{key:i,className:`flex ${m.role==="user"?"justify-end":"justify-start"}`},
        h('div',{className:`max-w-4/5 rounded-2xl px-3 py-2 text-xs leading-relaxed ${m.role==="user"?"text-white rounded-br-sm":"rounded-bl-sm "+( dark?"bg-gray-800 text-gray-100":"bg-gray-100 text-gray-800")}`,
          style:m.role==="user"?{background:"linear-gradient(135deg,#7c3aed,#06b6d4)",maxWidth:"85%"}:{maxWidth:"85%"}
        },m.text)
      )),
      loading&&h('div',{className:"flex justify-start"},
        h('div',{className:`rounded-2xl rounded-bl-sm px-3 py-2 ${dark?"bg-gray-800":"bg-gray-100"}`},
          h('div',{className:"flex gap-1 items-center"},
            ...[0,150,300].map(d=>h('span',{key:d,className:"w-1.5 h-1.5 rounded-full bg-gray-400 anim-bounce",style:{animationDelay:d+"ms"}}))
          )
        )
      ),
      h('div',{ref:endRef})
    ),
    h('div',{className:`p-2 border-t ${dark?"border-gray-700":"border-gray-100"}`},
      h('div',{className:"flex gap-1.5 mb-2 flex-wrap"},
        AI_TIPS.slice(0,2).map((t,i)=>h('button',{key:i,onClick:()=>setInp(t),
          className:`text-xs px-2 py-0.5 rounded-full border transition-colors ${dark?"border-gray-700 text-gray-400 hover:border-violet-500 hover:text-violet-400":"border-gray-200 text-gray-500 hover:border-violet-400 hover:text-violet-600"}`
        },t.substring(0,28)+"…"))
      ),
      h('div',{className:"flex gap-2"},
        h('input',{value:inp,onChange:e=>setInp(e.target.value),onKeyDown:e=>e.key==="Enter"&&send(),
          placeholder:"Pergunte sobre voos...",
          className:`flex-1 text-xs px-3 py-1.5 rounded-xl border outline-none ${dark?"bg-gray-800 border-gray-700 text-white placeholder-gray-500 focus:border-violet-500":"bg-gray-50 border-gray-200 text-gray-900 focus:border-violet-400"}`
        }),
        h('button',{onClick:send,disabled:loading||!inp.trim(),
          className:"w-7 h-7 rounded-xl flex items-center justify-center text-white disabled:opacity-50",
          style:{background:"linear-gradient(135deg,#7c3aed,#06b6d4)"}
        },h(Send,{size:12}))

}

            {v:"3",l:"Alertas ativos",icon:h(Bell,{size:17}),s:"2 disparados",c:"cyan"},
            {v:"R$1.8k",l:"Economia potencial",icon:h(TrendDown,{size:17}),s:"em voos monitorados",c:"emerald"},
            {v:"7",l:"Quedas de preço",icon:h(Zap,{size:17}),s:"últimos 30 dias",c:"amber"},
          ].map((s,i)=>h('div',{key:i,className:`rounded-2xl border p-4 ${card}`},
            h('div',{className:`w-8 h-8 rounded-xl flex items-center justify-center mb-2 ${s.c==="violet"?"bg-violet-500/20 text-violet-400":s.c==="cyan"?"bg-cyan-500/20 text-cyan-400":s.c==="emerald"?"bg-emerald-500/20 text-emerald-400":"bg-amber-500/20 text-amber-400"}`},s.icon),
            h('p',{className:`text-2xl font-bold ${txt}`},s.v),
            h('p',{className:`text-xs font-medium ${dark?"text-gray-300":"text-gray-700"}`},s.l),
            h('p',{className:`text-xs ${sub}`},s.s)
          ))
        ),
        h('h2',{className:`text-base font-bold mb-3 ${txt}`},"Histórico de rotas"),
        h('div',{className:`rounded-2xl border overflow-hidden ${card}`},
          h('table',{className:"w-full text-sm"},
            h('thead',{},
              h('tr',{className:dark?"bg-gray-800/60":"bg-gray-50"},
                ...["Rota","Mín","Atual","Média","Variação","Tendência"].map(col=>
                  h('th',{key:col,className:`px-4 py-3 text-left text-xs font-semibold ${sub}`},col)
                )
              )
            ),
            h('tbody',{},
              MON_ROUTES.map((r,i)=>h('tr',{key:i,className:`border-t transition-colors ${dark?"border-gray-800/50 hover:bg-gray-800/30":"border-gray-100 hover:bg-gray-50"}`},
                h('td',{className:`px-4 py-3 font-medium ${txt}`},`${r.origin} → ${r.dest}`),
                h('td',{className:"px-4 py-3 text-emerald-400 font-semibold"},`R$${r.min.toLocaleString()}`),
                h('td',{className:`px-4 py-3 ${dark?"text-gray-200":"text-gray-700"}`},`R$${r.cur.toLocaleString()}`),
                h('td',{className:`px-4 py-3 ${sub}`},`R$${r.avg.toLocaleString()}`),
                h('td',{className:`px-4 py-3 font-medium ${r.var<0?"text-emerald-400":"text-red-400"}`},(r.var>0?"+":"")+r.var.toFixed(1)+"%"),
                h('td',{className:"px-4 py-3"},
                  h(Sparkline,{data:[r.min,r.avg,r.cur,r.avg*.9,r.cur],height:28,color:r.trend==="down"?"#34d399":r.trend==="up"?"#f87171":"#60a5fa"})
                )
              ))
            )
          )
        )
      ),

      // ── CALENDAR ──────────────────────────────────────────────────────
      page==="calendar"&&h('div',{},
        h('div',{className:"flex items-center justify-between mb-6 flex-wrap gap-3"},
          h('h1',{className:`text-2xl font-bold ${txt}`},"📅 Calendário de Tarifas"),
          h('div',{className:"flex items-center gap-3"},
            h('span',{className:"flex items-center gap-1 text-xs text-emerald-400"},h('span',{className:"w-3 h-3 rounded-sm bg-emerald-500/40 inline-block"}),"Mais barato"),
            h('span',{className:"flex items-center gap-1 text-xs text-red-400"},h('span',{className:"w-3 h-3 rounded-sm bg-red-500/40 inline-block"}),"Mais caro")
          )
        ),
        h('div',{className:`rounded-2xl border p-5 mb-6 ${card}`},
          h('div',{className:"flex items-center justify-between mb-4"},
            h('button',{className:`p-2 rounded-lg ${dark?"hover:bg-gray-800 text-gray-400":"hover:bg-gray-100 text-gray-500"}`},"←"),
            h('p',{className:`font-bold text-lg ${txt}`},"Junho 2026"),
            h('button',{className:`p-2 rounded-lg ${dark?"hover:bg-gray-800 text-gray-400":"hover:bg-gray-100 text-gray-500"}`},"→")
          ),
          h('div',{className:"grid grid-cols-7 gap-1 mb-2"},
            ...["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"].map(d=>h('p',{key:d,className:`text-center text-xs font-semibold ${sub}`},d))
          ),
          h('div',{className:"grid grid-cols-7 gap-1"},
            ...[...Array(6)].map((_,i)=>h('div',{key:"e"+i})),
            ...Object.entries(CAL_PRICES).map(([day,price])=>{
              const isCheap=price<=minCal*1.1,isExp=price>=maxCal*.9;
              return h('div',{key:day,
                className:`rounded-xl p-1.5 cursor-pointer transition-all hover:scale-105 text-center ${isCheap?(dark?"bg-emerald-500/20 border border-emerald-500/30":"bg-emerald-50 border border-emerald-200"):isExp?(dark?"bg-red-500/20 border border-red-500/30":"bg-red-50 border border-red-200"):(dark?"bg-gray-800/50 border border-gray-700/30":"bg-gray-50 border border-gray-200")}`
              },
                h('p',{className:`text-xs font-medium ${sub}`},day),
                h('p',{className:`text-xs font-bold ${isCheap?"text-emerald-400":isExp?"text-red-400":dark?"text-gray-200":"text-gray-700"}`},`R$${price}`)
              );
            })
          )
        )
      ),

      // ── MAP ───────────────────────────────────────────────────────────
      page==="map"&&h('div',{},
        h('h1',{className:`text-2xl font-bold mb-1 ${txt}`},"🗺️ Mapa de Oportunidades"),
        h('p',{className:`text-sm mb-6 ${sub}`},"Saindo do Rio de Janeiro — menores preços encontrados"),
        h('div',{className:`relative rounded-2xl border overflow-hidden ${card}`,style:{height:400}},
          h('div',{className:"absolute inset-0",style:{background:dark?"linear-gradient(160deg,#0a1628,#0d2444 40%,#0a1628)":"linear-gradient(160deg,#dbeafe,#e0f2fe)"}}),
          // Origin
          h('div',{className:"absolute",style:{left:"35%",top:"65%",transform:"translate(-50%,-50%)"}},
            h('div',{className:"relative"},
              h('div',{className:"w-4 h-4 rounded-full border-2 border-white shadow-lg",style:{background:"#7c3aed"}}),
              h('div',{className:"absolute -top-7 left-1/2 px-2 py-0.5 rounded-full text-white text-xs font-medium whitespace-nowrap shadow",style:{transform:"translateX(-50%)",background:"#7c3aed"}},"Rio de Janeiro"),
              h('div',{className:"absolute inset-0 rounded-full anim-ping",style:{background:"rgba(124,58,237,0.3)"}})
            )
          ),
          // Destinations
          ...MAP_DESTS.map((d,i)=>h('div',{key:i,className:"absolute cursor-pointer group",style:{left:d.x+"%",top:d.y+"%",transform:"translate(-50%,-50%)"},
            onClick:()=>setPage("results")},
            h('div',{className:`rounded-xl px-2.5 py-1.5 border transition-all duration-200 group-hover:scale-110 shadow-lg ${dark?"bg-gray-900/90 border-gray-700 hover:border-violet-500/50":"bg-white/90 border-gray-200 hover:border-violet-400"}`},
              h('div',{className:"w-1.5 h-1.5 rounded-full bg-cyan-400 mx-auto mb-0.5"}),
              h('p',{className:`text-xs font-semibold whitespace-nowrap ${txt}`},d.city),
              h('p',{className:"text-xs text-cyan-400 font-bold whitespace-nowrap"},`R$${d.price.toLocaleString()}`)
            )
          )),
          h('div',{className:`absolute bottom-4 left-4 text-xs px-3 py-1.5 rounded-xl backdrop-blur ${dark?"bg-gray-800/80 text-gray-400":"bg-white/80 text-gray-500"}`},"💡 Clique em um destino para ver voos")
        ),
        h('div',{className:"grid grid-cols-2 md:grid-cols-4 gap-3 mt-4"},
          MAP_DESTS.slice(0,4).map((d,i)=>h('button',{key:i,onClick:()=>setPage("results"),
            className:`rounded-xl p-3 border text-left transition-all hover:scale-[1.02] ${card}`},
            h('p',{className:`text-sm font-semibold ${txt}`},d.city),
            h('p',{className:"text-lg font-bold text-cyan-400"},`R$${d.price.toLocaleString()}`),
            h('p',{className:`text-xs ${sub}`},"Ver voos →")
          ))
        )
      )
    ),

    // FOOTER
    h('footer',{className:`border-t mt-12 py-8 ${dark?"border-gray-800/60":"border-gray-200"}`},
      h('div',{className:"max-w-7xl mx-auto px-4"},
        h('div',{className:"grid grid-cols-2 md:grid-cols-4 gap-6 mb-6"},
          h('div',{},
            h('div',{className:"flex items-center gap-2 mb-3"},
              h('div',{className:"w-6 h-6 rounded-lg flex items-center justify-center",style:{background:"linear-gradient(135deg,#7c3aed,#06b6d4)"}},h(Plane,{size:11,className:"text-white"})),
              h('span',{className:"font-bold text-sm",style:{background:"linear-gradient(90deg,#a78bfa,#22d3ee)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"AirDeals")
            ),
            h('p',{className:`text-xs ${sub}`},"Monitore passagens aéreas e economize com inteligência artificial.")
          ),
          ...[
            {title:"Produto",items:["Buscar voos","Monitorar preços","Alertas","Calendário"]},
            {title:"Integrações",items:["Amadeus API","Kiwi API","TravelPayouts","API REST"]},
            {title:"Empresa",items:["Sobre nós","Blog","Termos","Privacidade"]},
          ].map((c,i)=>h('div',{key:i},
            h('p',{className:`text-xs font-bold mb-2 ${dark?"text-gray-300":"text-gray-700"}`},c.title),
            ...c.items.map(item=>h('p',{key:item,className:`text-xs mb-1.5 cursor-pointer hover:underline ${sub}`},item))
          ))
        ),
        h('div',{className:`pt-4 border-t flex items-center justify-between text-xs ${dark?"border-gray-800/60 text-gray-600":"border-gray-200 text-gray-400"}`},
          h('p',{},"© 2026 AirDeals. Todos os direitos reservados."),
          h('p',{className:"flex items-center gap-1"},"Powered by ",h('span',{className:"text-violet-400"},"Anthropic AI"))
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
