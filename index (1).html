// ── Smart airport search function ──────────────────────────────────────────
function searchAirports(q) {
  if (!q || q.length < 1) return [];
  const query = q.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  
  // Score each airport
  const scored = AIRPORTS.map(a => {
    const city = a.city.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    const country = a.country.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    const code = a.code.toLowerCase();
    const name = a.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    let score = 0;
    if (code === query) score = 100;
    else if (code.startsWith(query)) score = 80;
    else if (city === query) score = 90;
    else if (city.startsWith(query)) score = 70;
    else if (city.includes(query)) score = 50;
    else if (country.startsWith(query)) score = 40;
    else if (country.includes(query)) score = 30;
    else if (name.includes(query)) score = 20;
    return { a, score };
  }).filter(x => x.score > 0)
    .sort((x, y) => y.score - x.score)
    .slice(0, 8)
    .map(x => x.a);
  
  return scored;
}

function genFlights(origin,dest){
  const base=400+Math.floor(Math.random()*1800);
  return Array.from({length:6+Math.floor(Math.random()*4)},(_,i)=>{
    const al=AIRLINES[Math.floor(Math.random()*AIRLINES.length)];
    const dH=6+Math.floor(Math.random()*14),dM=[0,15,30,45][Math.floor(Math.random()*4)];
    const durH=1+Math.floor(Math.random()*11),durM=[0,15,30,45][Math.floor(Math.random()*4)];
    const stops=Math.random()>.55?0:Math.random()>.5?1:2;
    const price=Math.round(base*(0.7+Math.random()*.8)+stops*100*(Math.random()-.5));
    return {id:`F${i}${Date.now()}`,airline:al,
      dep:{time:`${String(dH).padStart(2,"0")}:${String(dM).padStart(2,"0")}`,code:origin.code},
      arr:{time:`${String((dH+durH)%24).padStart(2,"0")}:${String((dM+durM)%60).padStart(2,"0")}`,code:dest.code},
      duration:`${durH}h${durM>0?" "+durM+"m":""}`,durMins:durH*60+durM,
      stops,baggage:Math.random()>.4?"1 bagagem":"Só bagagem de mão",
      price,seats:Math.floor(Math.random()*8)+1};
  }).sort((a,b)=>a.price-b.price);
}

// ── Sparkline ──────────────────────────────────────────────────────────────
function Sparkline({data,color="#22d3ee",height=40}){
  const max=Math.max(...data),min=Math.min(...data),range=max-min||1;
  const w=120,pts=data.map((v,i)=>`${(i/(data.length-1))*w},${height-((v-min)/range)*(height-4)-2}`).join(" ");
  return h('svg',{width:w,height,style:{opacity:.8}},h('polyline',{points:pts,fill:"none",stroke:color,strokeWidth:"2",strokeLinecap:"round",strokeLinejoin:"round"}));
}

            h('p',{className:`text-xs ${sub}`},"Ver voos →")
          ))

      )
    ),

    // FOOTER
    h('footer',{className:`border-t mt-12 py-8 ${dark?"border-gray-800/60":"border-gray-200"}`},
      h('div',{className:"max-w-7xl mx-auto px-4"},
        h('div',{className:"grid grid-cols-2 md:grid-cols-4 gap-6 mb-6"},
          h('div',{},
            h('div',{className:"flex items-center gap-2 mb-3"},
              h('div',{className:"w-6 h-6 rounded-lg flex items-center justify-center",style:{background:"linear-gradient(135deg,#7c3aed,#06b6d4)"}},h(Plane,{size:11,className:"text-white"})),
              h('span',{className:"font-bold text-sm",style:{background:"linear-gradient(90deg,#a78bfa,#22d3ee)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"AirDeals")
            ),
            h('p',{className:`text-xs ${sub}`},"Monitore passagens aéreas e economize com inteligência artificial.")
          ),
          ...[
            {title:"Produto",items:["Buscar voos","Monitorar preços","Alertas","Calendário"]},
            {title:"Integrações",items:["Amadeus API","Kiwi API","TravelPayouts","API REST"]},
            {title:"Empresa",items:["Sobre nós","Blog","Termos","Privacidade"]},
          ].map((c,i)=>h('div',{key:i},
            h('p',{className:`text-xs font-bold mb-2 ${dark?"text-gray-300":"text-gray-700"}`},c.title),
            ...c.items.map(item=>h('p',{key:item,className:`text-xs mb-1.5 cursor-pointer hover:underline ${sub}`},item))
          ))
        ),
        h('div',{className:`pt-4 border-t flex items-center justify-between text-xs ${dark?"border-gray-800/60 text-gray-600":"border-gray-200 text-gray-400"}`},
          h('p',{},"© 2026 AirDeals. Todos os direitos reservados."),
          h('p',{className:"flex items-center gap-1"},"Powered by ",h('span',{className:"text-violet-400"},"Anthropic AI"))
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
